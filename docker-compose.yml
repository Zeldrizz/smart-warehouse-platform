services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: hw7-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - hw7-zookeeper-data:/var/lib/zookeeper/data
      - hw7-zookeeper-log:/var/lib/zookeeper/log

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hw7-kafka-1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - ./scripts:/scripts:ro
      - hw7-kafka-1-data:/var/lib/kafka/data
    entrypoint: ["/bin/bash", "/scripts/start_kafka_broker.sh"]
    stop_grace_period: 60s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hw7-kafka-2
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29093,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - ./scripts:/scripts:ro
      - hw7-kafka-2-data:/var/lib/kafka/data
    entrypoint: ["/bin/bash", "/scripts/start_kafka_broker.sh"]
    stop_grace_period: 60s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: hw7-schema-registry
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hw7-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./schemas:/schemas
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    environment:
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      EVENT_TOPIC: warehouse-events
      DLQ_TOPIC: warehouse-events-dlq

  cassandra-1:
    image: cassandra:4.1
    container_name: hw7-cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e \"DESCRIBE KEYSPACES\""]
      interval: 20s
      timeout: 20s
      retries: 15
      start_period: 45s
    volumes:
      - hw7-cassandra-1-data:/var/lib/cassandra

  cassandra-2:
    image: cassandra:4.1
    container_name: hw7-cassandra-2
    depends_on:
      cassandra-1:
        condition: service_healthy
    ports:
      - "9142:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e \"DESCRIBE KEYSPACES\""]
      interval: 20s
      timeout: 20s
      retries: 15
      start_period: 45s
    volumes:
      - hw7-cassandra-2-data:/var/lib/cassandra

  cassandra-3:
    image: cassandra:4.1
    container_name: hw7-cassandra-3
    depends_on:
      cassandra-2:
        condition: service_healthy
    ports:
      - "9242:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-cluster
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e \"DESCRIBE KEYSPACES\""]
      interval: 20s
      timeout: 20s
      retries: 15
      start_period: 45s
    volumes:
      - hw7-cassandra-3-data:/var/lib/cassandra

  cassandra-migrator:
    build:
      context: .
      dockerfile: ./migrator/Dockerfile
    container_name: hw7-cassandra-migrator
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    environment:
      CASSANDRA_CONTACT_POINTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_PORT: 9042

  wms-service:
    build:
      context: .
      dockerfile: ./wms_service/Dockerfile
    container_name: hw7-wms-service
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_TOPIC: warehouse-events
      SERVICE_PORT: 8001
      GENERATOR_ENABLED: ${GENERATOR_ENABLED:-true}
      GENERATOR_LIVE_EVENTS_PER_MINUTE: ${GENERATOR_LIVE_EVENTS_PER_MINUTE:-180}
      GENERATOR_PRODUCT_COUNT: ${GENERATOR_PRODUCT_COUNT:-320}
      GENERATOR_SUPPLIER_COUNT: ${GENERATOR_SUPPLIER_COUNT:-32}
      GENERATOR_SEED: ${GENERATOR_SEED:-42}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  consumer-service:
    build:
      context: .
      dockerfile: ./consumer_service/Dockerfile
    container_name: hw7-consumer-service
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
      cassandra-migrator:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    environment:
      SERVICE_PORT: 8002
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_TOPIC: warehouse-events
      KAFKA_DLQ_TOPIC: warehouse-events-dlq
      KAFKA_CONSUMER_GROUP: warehouse-state-consumer
      CASSANDRA_CONTACT_POINTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: warehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: hw7-kafka-exporter
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
    command:
      - "--kafka.server=kafka-1:29092"
      - "--kafka.server=kafka-2:29093"
      - "--group.filter=.*"
      - "--topic.filter=.*"
    ports:
      - "9308:9308"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: hw7-cadvisor
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hw7-alertmanager
    restart: unless-stopped
    ports:
      - "9094:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - hw7-alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hw7-prometheus
    restart: unless-stopped
    depends_on:
      wms-service:
        condition: service_healthy
      consumer-service:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - hw7-prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.0.0
    container_name: hw7-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - hw7-grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  tests:
    build:
      context: .
      dockerfile: ./tests/Dockerfile
    container_name: hw7-tests
    profiles: ["tests"]
    depends_on:
      wms-service:
        condition: service_healthy
      consumer-service:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      WMS_SERVICE_URL: http://wms-service:8001
      CONSUMER_SERVICE_URL: http://consumer-service:8002
      CASSANDRA_CONTACT_POINTS: cassandra-1
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: warehouse
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_DLQ_TOPIC: warehouse-events-dlq
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - ./artifacts:/tests/artifacts

  load-tests:
    image: grafana/k6:0.49.0
    container_name: hw7-load-tests
    profiles: ["load"]
    depends_on:
      wms-service:
        condition: service_healthy
    environment:
      BASE_URL: http://wms-service:8001
    volumes:
      - ./scripts/load:/scripts/load:ro
      - ./artifacts:/artifacts
    command: ["run", "--summary-export=/artifacts/load/k6-summary.json", "/scripts/load/wms_events.js"]

volumes:
  hw7-zookeeper-data:
  hw7-zookeeper-log:
  hw7-kafka-1-data:
  hw7-kafka-2-data:
  hw7-cassandra-1-data:
  hw7-cassandra-2-data:
  hw7-cassandra-3-data:
  hw7-alertmanager-data:
  hw7-prometheus-data:
  hw7-grafana-data:
